version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: skill_swap_db
      POSTGRES_USER: skill_swap_user
      POSTGRES_PASSWORD: skill_swap_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
