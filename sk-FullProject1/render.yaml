services:
  - type: web
    name: skill-swap
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && daphne -b 0.0.0.0 -p $PORT skill_swap.asgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://skill-swap-frontend.onrender.com"
      - key: WEBRTC_ICE_SERVERS_JSON
        value: '[{"urls":["stun:stun.l.google.com:19302","stun:stun1.l.google.com:19302"]},{"urls":"turn:openrelay.metered.ca:80","username":"openrelayproject","credential":"openrelayproject"},{"urls":"turn:openrelay.metered.ca:80?transport=tcp","username":"openrelayproject","credential":"openrelayproject"},{"urls":"turn:openrelay.metered.ca:443","username":"openrelayproject","credential":"openrelayproject"},{"urls":"turn:openrelay.metered.ca:443?transport=tcp","username":"openrelayproject","credential":"openrelayproject"},{"urls":"turns:openrelay.metered.ca:443?transport=tcp","username":"openrelayproject","credential":"openrelayproject"}]'
      - key: WEBRTC_FORCE_RELAY
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: skill-swap-db
          property: connectionString

  - type: web
    name: skill-swap-frontend
    env: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://skill-swap.onrender.com/api/

databases:
  - name: skill-swap-db
    plan: free
